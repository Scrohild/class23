<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>二十三班网页课表</title>
		<style type="text/css">
			body{
				text-align: center;
				background-color: #00AAFF;
			}
			.title{
				background-image:-webkit-linear-gradient(left,#AAAA00,#AAFF44,#88FF88,#00FFAA,#00AAAA);
				-webkit-background-clip:text;
				-webkit-text-fill-color:transparent;
			}
			.shedule{
				color: #AABB00;
			}
		</style>
	</head>
	<body>
		<!--title-->
		<div>
			<h1 class="title">高一二十三班</h1>
			<h2 class="title">class23.c1n.cn</h2>
		</div>
		<hr/>
		<!--shedule-->
		<div>
			<h4 class="shedule"; id="night"></h4>
			<script type="text/javascript">
				var myDate = new Date();
				var i=myDate.getDay();
				switch(i) {
					case 0:
						document.getElementById("night").innerHTML="今日晚节: 语文";
						break;
					case 1:
						document.getElementById("night").innerHTML="今日晚节: 生物";
						break;
					case 2:
						document.getElementById("night").innerHTML="今日晚节: 数学";
						break;
					case 3:
						document.getElementById("night").innerHTML="今日晚节: 化学";
						break;
					case 4:
						document.getElementById("night").innerHTML="今日晚节: 物理";
						break;
					case 5:
						document.getElementById("night").innerHTML="今日晚节: 英语";
						break;
					case 6:
						document.getElementById("night").innerHTML="今日晚节: 语文";
						break;
				}
			</script>
		</div>
	</body>
</html>
